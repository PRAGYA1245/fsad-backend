# ============================================================
# DEV PROFILE — H2 in-memory database (no MySQL required)
# Start with: ./mvnw.cmd spring-boot:run -Dspring-boot.run.profiles=dev
# ============================================================

spring.application.name=erp-backend

server.port=8080

# --- H2 In-Memory Database ---
spring.datasource.url=jdbc:h2:mem:erp_backend;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# --- H2 Console (accessible at http://localhost:8080/h2-console) ---
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# --- JPA / Hibernate ---
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# --- File upload ---
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# --- Security / JWT ---
app.security.jwt.secret=erp-super-secret-signing-key-change-this-in-production-123456789
app.security.jwt.expiration=PT8H
app.security.jwt.issuer=erp-backend
app.frontend-base-url=http://localhost:5173
app.file.upload-dir=uploads

# --- Logging ---
logging.level.com.erp.backend=DEBUG

# --- Disable OAuth2 client auto-config in dev (no client-id set) ---
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.oauth2.client.servlet.OAuth2ClientAutoConfiguration
